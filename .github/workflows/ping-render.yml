name: Keep Render Awake

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Curl staging URL
        continue-on-error: true
        run: |
          echo "Pinging sbxcars.onrender.com to keep instance awake"
          # Retry a few times and increase timeout to reduce intermittent failures
          curl -fsS --max-time 30 --retry 3 --retry-delay 5 --retry-connrefused https://sbxcars.onrender.com || echo 'Ping failed (non-fatal)'
